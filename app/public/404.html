<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>TI2MI</title>
    <script>
      // GitHub Pages SPA redirect: converts path to query param,
      // then index.html picks it up and restores the route.
      var pathSegmentsToKeep = 1; // /ti2mi/ = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
